<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업자 가입 | FRESHFARM WHOLESALE</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

 


<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <a href="index.html">FRESHFARM</a>
    </div>
    <h1>사업자 가입</h1>
    <p class="auth-sub">관리자 승인 후 도매가로 구매 가능합니다.</p>

    <div class="auth-form">
      <input type="text" id="company" placeholder="상호명 (사업자명)">
      <input type="text" id="name" placeholder="담당자 이름">
      <input type="tel" id="phone" placeholder="연락처">
      <input type="email" id="email" placeholder="이메일 주소">
      <input type="password" id="password" placeholder="비밀번호 (8자 이상)">
      <button class="btn-primary lg full" onclick="register()">가입 신청하기</button>
    </div>

    <div class="auth-footer">
      <p>이미 가입하셨나요? <a href="login.html">로그인하기 →</a></p>
    </div>
  </div>
</div>

<script type="module" src="js/auth.js"></script>



<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOc32CqDaBEg4dmcdbVMRpFFruAELeLsA",
  authDomain: "hihi-fbaf0.firebaseapp.com",
  projectId: "hihi-fbaf0",
  storageBucket: "hihi-fbaf0.firebasestorage.app",
  messagingSenderId: "163435184744",
  appId: "1:163435184744:web:02823b1dcd155605fa71dd",
  measurementId: "G-8S9TJ2NEGX"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const company = document.getElementById("company").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      email,
      company,
      role: "pending"
    });

    alert("가입 완료! 관리자 승인 후 이용 가능합니다.");
    location.href = "login.html";

  } catch (error) {
    alert("가입 실패: " + error.message);
  }
};
</script>


</body>
</html>
